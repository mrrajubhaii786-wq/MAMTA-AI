<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MAMTA AI V6.7</title>
  <script>
    // ============================================
    // GITHUB PAGES SPA ROUTING FIX
    // Redirects ALL paths back to index.html
    // ============================================

    (function() {
      var path = window.location.pathname;
      var search = window.location.search || '';

      var pageName = 'home';
      var pathParts = path.split('/').filter(function(p) { return p.length > 0; });
      var lastPart = pathParts[pathParts.length - 1];

      if (lastPart === 'workspace' || lastPart === 'admin' || lastPart === 'safedrop') {
        pageName = lastPart;
      }

      var redirectUrl = window.location.origin + '/MAMTA-AI/index.html#' + pageName + search;
      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body style="background:#0a0e1a; color:#94a3b8; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
  <div style="text-align:center;">
    <div style="font-size:3rem; margin-bottom:16px;">🧠</div>
    <h2 style="color:#f1f5f9; margin-bottom:8px;">MAMTA AI</h2>
    <p>Redirecting...</p>
  </div>
</body>
</html>
