<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMTA AI - Your Intelligent Assistant</title>
    <meta name="description" content="MAMTA AI - Your intelligent companion for coding, planning, and problem-solving">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(255,255,255,0.03);
            --bg-glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --text-primary: #e0e0e0;
            --text-secondary: #808090;
            --accent-cyan: #667eea;
            --accent-purple: #764ba2;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.2), transparent);
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #fff;
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .auth-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #user-info {
            font-size: 13px;
            color: var(--accent-cyan);
            display: none;
        }

        .btn-primary {
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Main Container */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        /* Welcome Section */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease;
        }

        .welcome h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a0a0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 24px;
            line-height: 1.6;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 10px 20px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #c0c0d0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: rgba(102, 126, 234, 0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        .user-message {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: var(--bg-glass);
            color: var(--text-primary);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
            margin-top: 4px;
        }

        .message-content {
            white-space: pre-wrap;
        }

        /* Typing Indicator */
        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input:focus {
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-input::placeholder {
            color: #606070;
        }

        .send-btn {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Auth Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #12121a;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: rgba(102, 126, 234, 0.5);
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-full:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .switch-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .switch-text a {
            color: var(--accent-cyan);
            cursor: pointer;
            text-decoration: none;
        }

        .close-modal {
            position: absolute;
            top: 16px; right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #fff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #505060;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .logo-text { font-size: 16px; }
            .nav-links { display: none; }
            .welcome h1 { font-size: 28px; }
            .main-container { padding: 16px; }
            .message { max-width: 90%; }
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        :focus-visible {
            outline: 2px solid var(--accent-cyan);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="stars"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">MAMTA AI</div>
        </div>

        <nav class="nav-links" role="navigation" aria-label="Main navigation">
            <a href="index.html" class="nav-btn active" aria-current="page">🏠 Chat</a>
            <a href="workspace.html" class="nav-btn">💻 Workspace</a>
            <a href="safedrop.html" class="nav-btn">🔒 SafeDrop</a>
        </nav>

        <div class="auth-section">
            <span id="user-info" role="status" aria-live="polite"></span>
            <button id="auth-btn" class="btn-primary" aria-label="Sign In">Sign In</button>
        </div>
    </header>

    <!-- Main -->
    <main class="main-container">
        <div class="welcome" id="welcome-section">
            <h1>Welcome to MAMTA AI</h1>
            <p>Your intelligent companion for coding, planning, and problem-solving. Start a conversation below!</p>
            <div class="quick-actions">
                <button class="quick-btn" data-action="code">💻 Write Code</button>
                <button class="quick-btn" data-action="plan">📋 Plan Project</button>
                <button class="quick-btn" data-action="debug">🐛 Debug Error</button>
                <button class="quick-btn" data-action="explain">📚 Explain</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-container" id="chat-container" role="log" aria-live="polite" aria-label="Chat messages"></div>

            <div class="input-area">
                <textarea 
                    class="chat-input" 
                    id="chat-input" 
                    rows="1" 
                    placeholder="Type your message... (Press Enter to send)"
                    aria-label="Chat message input"
                ></textarea>
                <button class="send-btn" id="send-btn" aria-label="Send message">➤</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        MAMTA AI v4.0 — Documentation is Memory • GitHub is Truth
    </footer>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <div class="modal" style="position: relative;">
            <button class="close-modal" onclick="closeAuthModal()" aria-label="Close modal">×</button>
            <h2 id="auth-title">Sign In</h2>

            <div id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="btn-full" id="login-btn" onclick="handleLogin()">Sign In</button>
            </div>

            <div id="signup-form" style="display: none;">
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="signup-name">Your Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" autocomplete="name">
                </div>
                <button class="btn-full" id="signup-btn" onclick="handleSignup()">Sign Up</button>
            </div>

            <button class="google-btn" onclick="handleGoogleAuth()">
                <span>🔍</span> Continue with Google
            </button>

            <div class="switch-text">
                <span id="switch-text">Don't have an account? <a onclick="switchAuthMode('signup')">Sign Up</a></span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="error-handler.js"></script>
    <script src="ai-service-v4.js"></script>
    <script src="firestore-v4.js"></script>
    <script src="app-v4.js"></script>

    <script>
        // Quick action handlers
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const action = this.getAttribute('data-action');
                const texts = {
                    code: 'Help me write code for ',
                    plan: 'Plan a project for ',
                    debug: 'Debug this error: ',
                    explain: 'Explain this concept: '
                };
                const input = document.getElementById('chat-input');
                if (input) {
                    input.value = texts[action] || '';
                    input.focus();
                }
            });
        });

        // Handle login
        async function handleLogin() {
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Signing In...';

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                if (window.errorHandler) {
                    window.errorHandler.showToast('Please enter email and password', 'warning');
                }
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            try {
                if (window.authService) {
                    await window.authService.signIn(email, password);
                    closeAuthModal();
                    if (window.errorHandler) {
                        window.errorHandler.showToast('Welcome back! 🎉', 'success');
                    }
                }
            } catch (error) {
                if (window.errorHandler) {
                    window.errorHandler.showToast(error.message, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        // Handle signup
        async function handleSignup() {
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;

            if (!email || !password) {
                if (window.errorHandler) {
                    window.errorHandler.showToast('Please enter email and password', 'warning');
                }
                btn.disabled = false;
                btn.textContent = 'Sign Up';
                return;
            }

            if (password.length < 6) {
                if (window.errorHandler) {
                    window.errorHandler.showToast('Password must be at least 6 characters', 'warning');
                }
                btn.disabled = false;
                btn.textContent = 'Sign Up';
                return;
            }

            try {
                if (window.authService) {
                    await window.authService.signUp(email, password, name);
                    closeAuthModal();
                    if (window.errorHandler) {
                        window.errorHandler.showToast('Account created! Please check your email. 📧', 'success');
                    }
                }
            } catch (error) {
                if (window.errorHandler) {
                    window.errorHandler.showToast(error.message, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign Up';
            }
        }

        // Handle Google auth
        async function handleGoogleAuth() {
            try {
                if (window.authService) {
                    await window.authService.signInWithGoogle();
                }
            } catch (error) {
                if (window.errorHandler) {
                    window.errorHandler.showToast(error.message, 'error');
                }
            }
        }

        // Switch auth mode
        function switchAuthMode(mode) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const authTitle = document.getElementById('auth-title');
            const switchText = document.getElementById('switch-text');

            if (mode === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                authTitle.textContent = 'Sign In';
                switchText.innerHTML = 'Don't have an account? <a onclick="switchAuthMode('signup')">Sign Up</a>';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                authTitle.textContent = 'Join MAMTA AI';
                switchText.innerHTML = 'Already have an account? <a onclick="switchAuthMode('login')">Sign In</a>';
            }
        }

        // Close modal
        function closeAuthModal() {
            const modal = document.getElementById('auth-modal');
            if (modal) modal.classList.remove('active');
        }

        // Show modal
        function showAuthModal(mode) {
            const modal = document.getElementById('auth-modal');
            if (modal) {
                modal.classList.add('active');
                switchAuthMode(mode);
            }
        }

        // Close modal on overlay click
        document.getElementById('auth-modal').addEventListener('click', function(e) {
            if (e.target === this) closeAuthModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeAuthModal();
        });
    </script>
</body>
</html>
