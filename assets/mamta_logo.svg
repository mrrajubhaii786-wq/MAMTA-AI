<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple gradient for M -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .spin { animation: spin 25s linear infinite; transform-origin: 250px 250px; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </defs>

  <!-- Outer purple ring -->
  <g class="spin">
    <circle cx="250" cy="250" r="190" stroke="url(#ringGrad)" stroke-width="2.5" fill="none" opacity="0.7" />
  </g>

  <!-- Inner subtle ring -->
  <circle cx="250" cy="250" r="165" stroke="url(#ringGrad)" stroke-width="1" fill="none" opacity="0.25" />

  <!-- M with roof top (like house icon) -->
  <!-- Roof / top part -->
  <path d="M175 200 L250 140 L325 200 L325 225 L250 165 L175 225 Z" fill="url(#mGrad)" opacity="0.95" />

  <!-- Left vertical bar -->
  <rect x="185" y="215" width="32" height="120" rx="3" fill="url(#mGrad)" opacity="0.95" />

  <!-- Right vertical bar -->
  <rect x="283" y="215" width="32" height="120" rx="3" fill="url(#mGrad)" opacity="0.95" />

  <!-- Center connecting piece (creates the diamond negative space) -->
  <path d="M217 215 L250 255 L283 215 L283 240 L250 280 L217 240 Z" fill="url(#mGrad)" opacity="0.95" />

  <!-- Diamond negative space (cutout) -->
  <polygon points="250,235 270,255 250,275 230,255" fill="#0B0F19" opacity="0.95" />

</svg>