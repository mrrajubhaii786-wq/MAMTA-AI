<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main purple gradient for M -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- CSS Animations -->
    <style>
      .spin-slow { animation: spinSlow 20s linear infinite; transform-origin: 250px 250px; }
      .pulse-soft { animation: pulseSoft 3s ease-in-out infinite; }

      @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulseSoft {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Outer purple ring (thin, animated) -->
  <g class="spin-slow">
    <circle cx="250" cy="250" r="195" stroke="url(#ringGrad)" stroke-width="2" 
            fill="none" opacity="0.8" />
  </g>

  <!-- Subtle inner ring -->
  <circle cx="250" cy="250" r="170" stroke="url(#ringGrad)" stroke-width="0.5" 
          fill="none" opacity="0.3" />

  <!-- M Monogram -->
  <!-- Left vertical bar -->
  <rect x="175" y="160" width="28" height="170" rx="4" fill="url(#mGrad)" opacity="0.95" />

  <!-- Right vertical bar -->
  <rect x="297" y="160" width="28" height="170" rx="4" fill="url(#mGrad)" opacity="0.95" />

  <!-- Top connecting bar (creates the "M" shape) -->
  <path d="M175 160 L249 230 L323 160 L323 190 L249 260 L175 190 Z" fill="url(#mGrad)" opacity="0.95" />

  <!-- Center diamond cutout (negative space) -->
  <polygon points="249,210 275,235 249,260 223,235" fill="#0F0A1A" opacity="0.9" />

  <!-- Glow dot at center -->
  <circle cx="249" cy="235" r="5" fill="#00F0FF" class="pulse-soft" filter="url(#softGlow)" />

</svg>