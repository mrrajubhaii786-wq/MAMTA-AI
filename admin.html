<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MAMTA AI</title>
  <script>
    // Redirect to index.html with hash
    var path = window.location.pathname;
    var page = 'home';
    if (path.indexOf('workspace') !== -1) page = 'workspace';
    else if (path.indexOf('admin') !== -1) page = 'admin';
    else if (path.indexOf('safedrop') !== -1) page = 'safedrop';
    window.location.replace(window.location.origin + '/MAMTA-AI/index.html#' + page);
  </script>
</head>
<body style="background:#0a0e1a;color:#94a3b8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
